<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>User Profile - Cinema</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="movies-data.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#e9508c",
            "background-light": "#f8f6f7",
            "background-dark": "#211117",
          },
          fontFamily: {
            display: ["Inter", "Noto Sans Thai", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', 'Noto Sans Thai', sans-serif; }
  </style>
</head>
<body class="bg-background-light text-slate-900 min-h-screen font-display">
  <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-primary/10 px-6 py-4">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <a class="text-3xl font-black tracking-tight" href="home.html">Cinema</a>
      <nav class="hidden md:flex items-center gap-8 text-sm font-semibold">
        <a class="hover:text-primary" href="home.html">หน้าแรก</a>
        <a class="hover:text-primary" href="movies.html">ภาพยนตร์</a>
        <a class="hover:text-primary" href="cinemas.html">โรงภาพยนตร์</a>
        <a class="hover:text-primary" href="promotions.html">โปรโมชั่น</a>
      </nav>
      <div class="size-11 rounded-full bg-primary text-white font-bold flex items-center justify-center" id="user-avatar">U</div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8 space-y-8">
    <section class="bg-white rounded-xl p-6 shadow-sm border border-primary/10">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h1 class="text-2xl font-bold" id="profile-name">ผู้ใช้</h1>
          <p class="text-slate-500 mt-1" id="profile-email">email@example.com</p>
          <div class="flex flex-wrap gap-4 mt-3 text-sm">
            <span class="inline-flex items-center gap-1 text-primary font-semibold">
              <span class="material-symbols-outlined text-base">stars</span>
              <span id="profile-tier">Member</span>
            </span>
            <span class="inline-flex items-center gap-1 text-slate-600">
              <span class="material-symbols-outlined text-base">loyalty</span>
              <span>คะแนนสะสม: <strong id="profile-points">0</strong> แต้ม</span>
            </span>
          </div>
        </div>
        <button class="px-6 py-2.5 bg-primary text-white rounded-lg font-bold hover:bg-pink-600 transition-colors" id="logout-btn-user">Logout</button>
      </div>
    </section>

    <section>
      <h2 class="text-xl font-bold mb-4">ตั๋วของฉัน</h2>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4" id="upcoming-list">
        <div class="bg-white rounded-xl p-5 border border-primary/10 text-slate-500">ยังไม่มีข้อมูลการจอง</div>
      </div>
    </section>

    <section>
      <h2 class="text-xl font-bold mb-4">Watchlist ของฉัน</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="watchlist-grid">
        <div class="bg-white rounded-xl p-5 border border-primary/10 text-slate-500">ยังไม่มีรายการ Watchlist</div>
      </div>
    </section>

    <section>
      <h2 class="text-xl font-bold mb-4">ประวัติการซื้อ</h2>
      <div class="bg-white rounded-xl border border-primary/10 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left text-sm">
            <thead class="bg-primary/5 text-primary">
              <tr>
                <th class="px-4 py-3">ภาพยนตร์</th>
                <th class="px-4 py-3">เวลา</th>
                <th class="px-4 py-3">ที่นั่ง</th>
                <th class="px-4 py-3">ราคา</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-primary/10" id="history-table-body">
              <tr><td class="px-4 py-3 text-slate-500" colspan="4">ยังไม่มีประวัติ</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyC0I4lXYHrxh1543AF1NZcdAYulS2jbftM',
      authDomain: 'frame-4e170.firebaseapp.com',
      projectId: 'frame-4e170',
      storageBucket: 'frame-4e170.firebasestorage.app',
      messagingSenderId: '585102075629',
      appId: '1:585102075629:web:f5c9d3e3745b8a35570ee4',
      measurementId: 'G-0TCR1Y4LP2'
    };

    const isLocalHost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    const API_BASE = window.location.protocol === 'file:' || (isLocalHost && window.location.port !== '4316')
      ? 'http://localhost:4316'
      : '';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const profileName = document.getElementById('profile-name');
    const profileEmail = document.getElementById('profile-email');
    const profilePoints = document.getElementById('profile-points');
    const profileTier = document.getElementById('profile-tier');
    const userAvatar = document.getElementById('user-avatar');
    const upcomingList = document.getElementById('upcoming-list');
    const historyTableBody = document.getElementById('history-table-body');
    const watchlistGrid = document.getElementById('watchlist-grid');
    const logoutBtn = document.getElementById('logout-btn-user');
    const WATCHLIST_KEY = 'cinema.watchlistByUid';

    function tierByPoints(points) {
      if (points >= 3000) return 'Platinum Member';
      if (points >= 1200) return 'Gold Member';
      if (points >= 500) return 'Silver Member';
      return 'Member';
    }

    function formatDateLabel(showtime) {
      return `${showtime?.dateLabel || '-'} ${showtime?.startTime || ''}`.trim();
    }

    function findMovieRef(booking) {
      if (!booking || typeof moviesDatabase === 'undefined') return null;
      const movieId = booking.showtime?.movieId || booking.movie?.id;
      if (movieId && moviesDatabase[movieId]) return moviesDatabase[movieId];

      const title = String(booking.movie?.title || '').trim().toLowerCase();
      return Object.values(moviesDatabase).find((movieItem) => {
        const thai = String(movieItem.titleThai || '').trim().toLowerCase();
        const eng = String(movieItem.titleEng || '').trim().toLowerCase();
        return thai === title || eng === title;
      }) || null;
    }

    function getPosterForBooking(booking) {
      const movieRef = findMovieRef(booking);
      if (movieRef) return movieRef.backdropImage || movieRef.trailerImage;
      return booking.movie?.poster || 'https://picsum.photos/seed/movie-ticket-fallback/500/750';
    }

    async function hydrateUpcomingPosters() {
      const posterEls = Array.from(document.querySelectorAll('#upcoming-list img[data-booking-movie-id]'));
      await Promise.all(posterEls.map(async (imgEl) => {
        const movieId = imgEl.getAttribute('data-booking-movie-id');
        if (!movieId || typeof moviesDatabase === 'undefined') return;
        const movieRef = moviesDatabase[movieId];
        if (!movieRef || !window.cinemaMovieImages?.getRealMoviePoster) return;
        const realPoster = await window.cinemaMovieImages.getRealMoviePoster(movieRef);
        if (realPoster) imgEl.src = realPoster;
      }));
    }

    async function hydrateWatchlistPosters() {
      const posterEls = Array.from(document.querySelectorAll('#watchlist-grid img[data-watchlist-movie-id]'));
      await Promise.all(posterEls.map(async (imgEl) => {
        const movieId = imgEl.getAttribute('data-watchlist-movie-id');
        if (!movieId || typeof moviesDatabase === 'undefined') return;
        const movieRef = moviesDatabase[movieId];
        if (!movieRef || !window.cinemaMovieImages?.getRealMoviePoster) return;
        const realPoster = await window.cinemaMovieImages.getRealMoviePoster(movieRef);
        if (realPoster) imgEl.src = realPoster;
      }));
    }

    function readWatchlistMap() {
      try {
        const raw = localStorage.getItem(WATCHLIST_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        return parsed && typeof parsed === 'object' ? parsed : {};
      } catch (_error) {
        return {};
      }
    }

    function getWatchlistForUid(uid) {
      const watchlistMap = readWatchlistMap();
      const ids = Array.isArray(watchlistMap[uid]) ? watchlistMap[uid] : [];
      if (typeof moviesDatabase === 'undefined') return [];
      return ids
        .map((id) => moviesDatabase[id])
        .filter(Boolean);
    }

    function removeFromWatchlist(uid, movieId) {
      if (!uid || !movieId) return;
      const watchlistMap = readWatchlistMap();
      const current = new Set(Array.isArray(watchlistMap[uid]) ? watchlistMap[uid] : []);
      if (!current.has(movieId)) return;
      current.delete(movieId);
      watchlistMap[uid] = Array.from(current);
      localStorage.setItem(WATCHLIST_KEY, JSON.stringify(watchlistMap));
    }

    function renderWatchlist(uid) {
      if (!watchlistGrid) return;
      const items = getWatchlistForUid(uid);
      if (items.length === 0) {
        watchlistGrid.innerHTML = '<div class="bg-white rounded-xl p-5 border border-primary/10 text-slate-500">ยังไม่มีรายการ Watchlist</div>';
        return;
      }

      watchlistGrid.innerHTML = items.map((movie) => `
        <div class="bg-white rounded-xl p-4 border border-primary/10 flex gap-3">
          <img class="w-16 h-24 rounded-lg object-cover bg-slate-100 flex-shrink-0" src="${movie.backdropImage || movie.trailerImage}" alt="${movie.titleThai}" data-watchlist-movie-id="${movie.id}" />
          <div class="min-w-0 flex-1">
            <h3 class="font-bold text-slate-900 leading-tight line-clamp-2">${movie.titleThai}</h3>
            <p class="text-xs text-slate-500 mt-1 line-clamp-1">${movie.titleEng || ''}</p>
            <p class="text-xs text-slate-500 mt-1">${movie.duration || '-'} • ${Array.isArray(movie.genres) ? movie.genres.join(', ') : '-'}</p>
            <div class="mt-3 flex items-center gap-3">
              <a class="inline-flex text-xs font-bold text-primary hover:underline" href="movie-details.html?id=${encodeURIComponent(movie.id)}">เปิดรายละเอียด</a>
              <button class="watchlist-remove-btn inline-flex text-xs font-bold text-rose-500 hover:underline" data-remove-movie-id="${movie.id}" type="button">ลบออกจาก Watchlist</button>
            </div>
          </div>
        </div>
      `).join('');

      hydrateWatchlistPosters();

      watchlistGrid.querySelectorAll('.watchlist-remove-btn').forEach((buttonEl) => {
        buttonEl.addEventListener('click', () => {
          const movieId = buttonEl.getAttribute('data-remove-movie-id');
          removeFromWatchlist(uid, movieId);
          renderWatchlist(uid);
        });
      });
    }

    function renderBookings(bookings) {
      if (!Array.isArray(bookings) || bookings.length === 0) {
        upcomingList.innerHTML = '<div class="bg-white rounded-xl p-5 border border-primary/10 text-slate-500">ยังไม่มีข้อมูลการจอง</div>';
        historyTableBody.innerHTML = '<tr><td class="px-4 py-3 text-slate-500" colspan="4">ยังไม่มีประวัติ</td></tr>';
        return;
      }

      const sorted = [...bookings].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      upcomingList.innerHTML = sorted.slice(0, 2).map((booking) => `
        <div class="bg-white rounded-xl p-5 border border-primary/10 flex gap-4">
          <img class="w-20 h-28 rounded-lg object-cover bg-slate-100 flex-shrink-0" src="${getPosterForBooking(booking)}" data-booking-movie-id="${findMovieRef(booking)?.id || ''}" alt="${booking.movie?.title || 'Movie'}" />
          <div class="min-w-0 flex-1">
            <h3 class="font-bold text-lg truncate">${booking.movie?.title || '-'}</h3>
            <p class="text-sm text-slate-500 mt-1">${booking.movie?.cinema || '-'} • ${booking.movie?.hall || '-'}</p>
            <p class="text-sm text-slate-500">${formatDateLabel(booking.showtime)}</p>
            <p class="text-sm text-slate-600 mt-2">ที่นั่ง: ${Array.isArray(booking.seats) ? booking.seats.join(', ') : '-'}</p>
            <div class="mt-4 flex gap-2">
              <a class="px-3 py-2 text-sm font-bold rounded-lg bg-primary text-white hover:bg-pink-600" href="booking-confirmation.html?bookingId=${encodeURIComponent(booking.bookingId)}">เปิดตั๋ว</a>
              <span class="px-3 py-2 text-xs rounded-lg border border-primary/20 text-primary font-semibold">${booking.bookingId}</span>
            </div>
          </div>
        </div>
      `).join('');

      hydrateUpcomingPosters();

      historyTableBody.innerHTML = sorted.map((booking) => `
        <tr>
          <td class="px-4 py-3 font-medium">${booking.movie?.title || '-'}</td>
          <td class="px-4 py-3 text-slate-600">${formatDateLabel(booking.showtime)}</td>
          <td class="px-4 py-3 text-slate-600">${Array.isArray(booking.seats) ? booking.seats.join(', ') : '-'}</td>
          <td class="px-4 py-3 font-semibold">${Number(booking.pricing?.total || 0).toLocaleString('th-TH')} บาท</td>
        </tr>
      `).join('');
    }

    async function loadUserData(user) {
      const uid = user.uid;
      const displayName = user.displayName || localStorage.getItem('cinema.userDisplayName') || 'ผู้ใช้';
      const email = user.email || localStorage.getItem('cinema.userEmail') || 'email@example.com';

      profileName.textContent = displayName;
      profileEmail.textContent = email;
      userAvatar.textContent = (displayName || email).charAt(0).toUpperCase();

      try {
        const userResponse = await fetch(`${API_BASE}/api/users/${encodeURIComponent(uid)}`);
        if (userResponse.ok) {
          const userData = await userResponse.json();
          const points = Number(userData.loyaltyPoints || 0);
          profilePoints.textContent = points.toLocaleString('th-TH');
          profileTier.textContent = tierByPoints(points);
        } else {
          profilePoints.textContent = '0';
          profileTier.textContent = 'Member';
        }
      } catch (_error) {
        profilePoints.textContent = '0';
        profileTier.textContent = 'Member';
      }

      try {
        const bookingResponse = await fetch(`${API_BASE}/api/users/${encodeURIComponent(uid)}/bookings`);
        const bookings = bookingResponse.ok ? await bookingResponse.json() : [];
        renderBookings(bookings);
      } catch (_error) {
        renderBookings([]);
      }

      renderWatchlist(uid);
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'home.html';
        return;
      }
      loadUserData(user);
    });

    logoutBtn.addEventListener('click', async () => {
      try {
        await signOut(auth);
      } catch (_error) {
      }
      localStorage.removeItem('cinema.uid');
      localStorage.removeItem('cinema.userEmail');
      localStorage.removeItem('cinema.userDisplayName');
      window.location.href = 'home.html';
    });
  </script>
</body>
</html>
