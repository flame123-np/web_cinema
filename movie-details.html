    <script>
        (async () => {
            const WATCHLIST_KEY = 'cinema.watchlistByUid';

            // Get movie ID from URL parameter
            const params = new URLSearchParams(window.location.search);
            const movieId = params.get('id') || 'death-whisperer-2';
            const movie = moviesDatabase[movieId];

            if (!movie) {
                alert('Movie not found!');
                window.location.href = 'home.html';
                return;
            }

            // Update page title
            document.getElementById('page-title').textContent = `${movie.titleThai} - Major Cineplex`;

            // Update hero section
            const realPoster = window.cinemaMovieImages?.getRealMoviePoster
                ? await window.cinemaMovieImages.getRealMoviePoster(movie)
                : null;
            const heroBackdrop = realPoster || movie.backdropImage;
            const heroTrailer = realPoster || movie.trailerImage || movie.backdropImage;
            document.getElementById('hero-backdrop').style.backgroundImage = `url('${heroBackdrop}')`;
            document.getElementById('hero-trailer-bg').style.backgroundImage = `url('${heroTrailer}')`;

            // Update genres
            const genresContainer = document.getElementById('hero-genres');
            genresContainer.innerHTML = movie.genres.map(genre => 
                `<span class="px-3 py-1 rounded-full border border-white/20 text-xs font-medium text-white/80">${genre}</span>`
            ).join('');
            genresContainer.innerHTML += `<span class="px-3 py-1 rounded-full bg-white/10 text-xs font-medium text-white/80">${movie.duration}</span>`;

            // Update title
            document.getElementById('hero-title').innerHTML = `${movie.titleThai} <span class="block text-2xl md:text-3xl font-normal text-gray-300 mt-1">${movie.titleEng}</span>`;

            // Update rating and reviews
            document.getElementById('hero-rating').textContent = movie.rating;
            document.getElementById('hero-reviews').textContent = `(${movie.reviews} Reviews)`;
            document.getElementById('hero-release').textContent = `Release: ${movie.releaseDate}`;
            document.getElementById('hero-description').textContent = movie.description;

            // Update showtimes
            const showtimesContainer = document.getElementById('showtimes-container');
            showtimesContainer.innerHTML = movie.showtimes.map(cinema => `
                <div class="flex flex-col md:flex-row gap-6 pb-8 border-b border-gray-100 last:border-0">
                    <div class="w-full md:w-1/4">
                        <h3 class="text-lg font-bold text-slate-900 mb-1">${cinema.cinema}</h3>
                        <p class="text-sm text-slate-500 mb-3 flex items-center gap-1">
                            <span class="material-symbols-outlined text-sm">near_me</span> ${cinema.distance}
                        </p>
                        <div class="flex gap-2 flex-wrap">
                            ${cinema.amenities.map(amenity => `<span class="text-[10px] font-bold px-2 py-1 bg-gray-100 text-slate-600 rounded uppercase tracking-wider">${amenity}</span>`).join('')}
                        </div>
                    </div>
                    <div class="w-full md:w-3/4 space-y-6">
                        ${cinema.systems.map(system => `
                            <div>
                                <div class="flex items-center gap-3 mb-3">
                                    <div class="h-6 px-3 ${system.format === 'IMAX' ? 'w-12 bg-black' : 'bg-gray-200'} rounded flex items-center justify-center ${system.format === 'VIP Class' ? 'border border-yellow-200 bg-yellow-100' : ''}">
                                        <span class="${system.format === 'IMAX' ? 'text-blue-400 font-black italic text-xs tracking-widest' : 'text-slate-600 font-bold text-xs'}">${system.format}</span>
                                    </div>
                                    <span class="text-sm font-medium text-slate-700">${system.type}</span>
                                </div>
                                <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3">
                                    ${system.times.map(showtime => `
                                        <button class="group relative flex flex-col items-center justify-center py-2 px-3 border border-gray-200 rounded-lg hover:border-primary hover:bg-primary/5 transition-all showtime-btn" data-showtime="${showtime.time}" data-hall="${showtime.hall}">
                                            <span class="text-lg font-bold text-slate-900 group-hover:text-primary">${showtime.time}</span>
                                            <span class="text-[10px] text-slate-500">${showtime.hall}</span>
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            // Update cast
            const castContainer = document.getElementById('cast-container');

            const castImageFallbackByName = {
                'Brie Larson': 'https://upload.wikimedia.org/wikipedia/commons/4/40/Captain_Marvel_trailer_at_the_National_Air_and_Space_Museum_4_%28cropped%29.jpg',
                'Teyonah Parris': 'https://upload.wikimedia.org/wikipedia/commons/3/3a/Teyonah_Parris_%2848468994196%29_%28ht%29.jpg',
                'Iman Vellani': 'https://upload.wikimedia.org/wikipedia/commons/6/6e/Iman_Vellani_2022_%282%29.png',
                'Samuel L. Jackson': 'https://upload.wikimedia.org/wikipedia/commons/2/29/SamuelLJackson.jpg',
                'Jennifer Lawrence': 'https://upload.wikimedia.org/wikipedia/commons/0/01/Jennifer_Lawrence%2C_Cannes_Film_Festival_2025.jpg',
                'Josh Hutcherson': 'https://upload.wikimedia.org/wikipedia/commons/3/3e/Josh_Hutcherson_by_Gage_Skidmore_2.jpg',
                'Liam Hemsworth': 'https://upload.wikimedia.org/wikipedia/commons/a/a4/Liam_Hemsworth_June_2016.jpg',
                'Woody Harrelson': 'https://upload.wikimedia.org/wikipedia/commons/3/3a/Woody_Harrelson_191020-N-NU281-1028_%28cropped%29.jpg',
                'Leonardo DiCaprio': 'https://upload.wikimedia.org/wikipedia/commons/2/2d/LeoPTABFI191125-28_%28cropped%29.jpg',
                'Robert De Niro': 'https://upload.wikimedia.org/wikipedia/commons/c/c1/Robert_de_Niro_Cannes_Film_Festival_%283x4_cropped%29.jpg',
                'Lily Gladstone': 'https://upload.wikimedia.org/wikipedia/commons/f/f9/Lily_Gladstone_at_the_2024_Cannes_Film_Festival_%28cropped%29.jpg',
                'Justin Timberlake': 'https://upload.wikimedia.org/wikipedia/commons/e/ed/Justin_Timberlake_by_Gage_Skidmore_2.jpg',
                'Anna Kendrick': 'https://upload.wikimedia.org/wikipedia/commons/1/13/Anna_Kendrick_Cannes_2016_2.jpg',
                'Zooey Deschanel': 'https://upload.wikimedia.org/wikipedia/commons/0/00/Zooey_Deschanel_-_Song_Sung_Blue.jpg',
                'Nadech Kugimiya': 'https://upload.wikimedia.org/wikipedia/commons/1/13/NadechKugimiya2014.jpg',
                'Denise Jelilcha': 'https://upload.wikimedia.org/wikipedia/commons/3/30/Denise072024.jpg',
                'Rattanawadee': 'https://upload.wikimedia.org/wikipedia/commons/0/05/Rattanawadee_2024-11-27.png'
            };

            function getCastImage(actor) {
                const byName = castImageFallbackByName[String(actor?.name || '').trim()];
                return byName || actor.image || 'https://picsum.photos/seed/cast-fallback/200/200';
            }

            function readWatchlistMap() {
                try {
                    const raw = localStorage.getItem(WATCHLIST_KEY);
                    const parsed = raw ? JSON.parse(raw) : {};
                    return parsed && typeof parsed === 'object' ? parsed : {};
                } catch (_error) {
                    return {};
                }
            }

            function writeWatchlistMap(nextMap) {
                localStorage.setItem(WATCHLIST_KEY, JSON.stringify(nextMap));
            }

            function getCurrentUid() {
                return localStorage.getItem('cinema.uid') || '';
            }

            function addMovieToWatchlist(targetMovieId) {
                const uid = getCurrentUid();
                if (!uid) return { ok: false, message: 'กรุณาเข้าสู่ระบบก่อน' };

                const watchlistMap = readWatchlistMap();
                const current = new Set(Array.isArray(watchlistMap[uid]) ? watchlistMap[uid] : []);
                if (current.has(targetMovieId)) {
                    return { ok: true, existed: true };
                }

                current.add(targetMovieId);
                watchlistMap[uid] = Array.from(current);
                writeWatchlistMap(watchlistMap);
                return { ok: true, existed: false };
            }

            function removeMovieFromWatchlist(targetMovieId) {
                const uid = getCurrentUid();
                if (!uid) return { ok: false, message: 'กรุณาเข้าสู่ระบบก่อน' };

                const watchlistMap = readWatchlistMap();
                const current = new Set(Array.isArray(watchlistMap[uid]) ? watchlistMap[uid] : []);
                if (!current.has(targetMovieId)) {
                    return { ok: true, removed: false };
                }

                current.delete(targetMovieId);
                watchlistMap[uid] = Array.from(current);
                writeWatchlistMap(watchlistMap);
                return { ok: true, removed: true };
            }

            function toggleMovieInWatchlist(targetMovieId) {
                const uid = getCurrentUid();
                if (!uid) return { ok: false, message: 'กรุณาเข้าสู่ระบบก่อน' };

                const map = readWatchlistMap();
                const list = Array.isArray(map[uid]) ? map[uid] : [];
                if (list.includes(targetMovieId)) {
                    const removed = removeMovieFromWatchlist(targetMovieId);
                    return { ...removed, action: 'removed' };
                }

                const added = addMovieToWatchlist(targetMovieId);
                return { ...added, action: 'added' };
            }

            function updateWatchlistButtonState() {
                const btn = document.getElementById('watchlist-hero-btn');
                if (!btn) return;
                const uid = getCurrentUid();
                const map = readWatchlistMap();
                const list = uid && Array.isArray(map[uid]) ? map[uid] : [];
                const inWatchlist = list.includes(movieId);
                btn.innerHTML = inWatchlist
                    ? '<span class="material-symbols-outlined">check</span>บันทึกแล้วใน Watchlist'
                    : '<span class="material-symbols-outlined">add</span>เพิ่มไป Watchlist';
            }

            const filteredCast = movie.cast.filter(actor => String(actor?.name || '').trim() !== 'Junior Kajbhunditt');

            castContainer.innerHTML = filteredCast.map(actor => `
                <div class="flex flex-col items-center text-center">
                    <div class="w-24 h-24 rounded-full bg-gray-200 mb-3 overflow-hidden shadow-md">
                        <div class="w-full h-full bg-cover bg-center" style="background-image: url('${getCastImage(actor)}');"></div>
                    </div>
                    <h4 class="font-bold text-slate-900 text-sm">${actor.name}</h4>
                    <p class="text-xs text-slate-500">${actor.role}</p>
                </div>
            `).join('');

            // Handle showtime button clicks
            document.querySelectorAll('.showtime-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const time = btn.getAttribute('data-showtime');
                    const hall = btn.getAttribute('data-hall');
                    window.authModule.requireLogin(() => {
                        // Store selection and navigate to seat selection
                        sessionStorage.setItem('selectedMovieId', movieId);
                        sessionStorage.setItem('selectedTime', time);
                        sessionStorage.setItem('selectedHall', hall);
                        window.location.href = 'seat-selection.html';
                    });
                });
            });

            // Handle buy ticket button
            document.getElementById('buy-ticket-hero-btn').addEventListener('click', () => {
                const firstShowtime = movie.showtimes[0].systems[0].times[0];
                window.authModule.requireLogin(() => {
                    sessionStorage.setItem('selectedMovieId', movieId);
                    sessionStorage.setItem('selectedTime', firstShowtime.time);
                    sessionStorage.setItem('selectedHall', firstShowtime.hall);
                    window.location.href = 'seat-selection.html';
                });
            });

            const watchlistBtn = document.getElementById('watchlist-hero-btn');
            if (watchlistBtn) {
                watchlistBtn.addEventListener('click', () => {
                    window.authModule.requireLogin(() => {
                        const result = toggleMovieInWatchlist(movieId);
                        if (!result.ok) {
                            alert(result.message || 'ไม่สามารถอัปเดต Watchlist ได้');
                            return;
                        }
                        updateWatchlistButtonState();
                        if (result.action === 'added' && !result.existed) {
                            alert('เพิ่มลง Watchlist แล้ว');
                        } else if (result.action === 'removed' && result.removed) {
                            alert('ลบออกจาก Watchlist แล้ว');
                        }
                    });
                });
            }

            updateWatchlistButtonState();
        })();
    </script>

    <!-- Login Modal Backdrop & Container -->
    <div id="auth-backdrop" class="fixed inset-0 bg-black/0 backdrop-blur-0 transition-all duration-300 z-40 hidden" style="pointer-events: none;"></div>

    <!-- Login/Signup Modal -->
    <div id="auth-modal" class="fixed inset-0 flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl max-w-md w-full transform transition-all duration-300 overflow-hidden">
            <!-- Modal Header -->
            <div class="flex items-center justify-between p-6 border-b border-slate-200 dark:border-slate-700">
                <h2 class="text-2xl font-black text-slate-900 dark:text-white" id="modal-title">เข้าสู่ระบบ</h2>
                <button id="modal-close-btn" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
                    <span class="material-symbols-outlined text-2xl">close</span>
                </button>
            </div>

            <!-- Modal Content -->
            <div class="p-6">
                <!-- Tab Buttons -->
                <div class="flex gap-2 mb-6 bg-slate-100 dark:bg-slate-700 p-1 rounded-lg">
                    <button class="auth-tab-btn flex-1 py-2 px-4 rounded-md font-semibold text-sm transition-colors tab-login active bg-white dark:bg-slate-600 text-slate-900 dark:text-white" data-tab="login">
                        เข้าสู่ระบบ
                    </button>
                    <button class="auth-tab-btn flex-1 py-2 px-4 rounded-md font-semibold text-sm transition-colors tab-signup text-slate-600 dark:text-slate-300" data-tab="signup">
                        สร้างบัญชี
                    </button>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">อีเมล</label>
                        <input id="login-email" type="email" placeholder="your@email.com" class="w-full px-4 py-2.5 border border-slate-200 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent" required/>
                    </div>
